[pytest]
# Pytest Configuration for Construction Management App

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directory
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Coverage options (if using pytest-cov)
# --cov=.
# --cov-report=html
# --cov-report=term-missing

# Markers for categorizing tests
markers =
    auth: Authentication and authorization tests
    staff: Staff management tests
    attendance: Attendance tracking tests
    vehicles: Vehicle management tests
    finance: Finance and invoice tests
    projects: Project management tests
    integration: Integration tests
    security: Security and data isolation tests
    edge_case: Edge case and error handling tests
    performance: Performance and load tests
    slow: Tests that take more than 1 second
    smoke: Critical smoke tests

# Timeout for tests (seconds)
timeout = 30

# Show summary
console_output_style = progress

# Minimal Python version
minversion = 3.8
